<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seguridad Web</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* BOTÓN SUPERIOR IZQUIERDO */

.top-left{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
}

.btn{
    background:#38bdf8;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

/* CONTENIDO CENTRAL */

.main{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    padding:20px;
}

.content{
    max-width:700px;
}

/* VENTANA EMERGENTE */

.modal{
    display:none;
    position:fixed;
    z-index:2000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

/* CONTENEDOR PDF */

.modal-content{
    position:relative;
    background:white;
    width:80%;
    height:80%;
    margin:5% auto;
    border-radius:10px;
    overflow:hidden;
}

.modal iframe{
    width:100%;
    height:100%;
    border:none;
}

</style>
</head>

<body>

<!-- BOTÓN -->

<div class="top-left">
    <button class="btn" onclick="openModal()">
        Ver contrato
    </button>
</div>

<!-- CONTENIDO CENTRAL -->

<div class="main">
    <div class="content">

        <h1>Auditoría de Seguridad Web</h1>

        <p>
            Identificación de vulnerabilidades y revisión básica         
            
        </p>

    </div>
</div>

<!-- MODAL -->

<div id="contractModal" class="modal">

    <div class="modal-content">

        <iframe src="contrato.pdf"></iframe>

    </div>
 <div class="card">
    <h2>Importante</h2>
    <p>Solo realizo pruebas con autorización del propietario del sitio web.</p>
  </div>   

</div>

<script>

const modal = document.getElementById("contractModal");

function openModal(){
    modal.style.display = "block";
}

/* CERRAR SI HACE CLICK FUERA */

window.onclick = function(event){

    if(event.target == modal){
        modal.style.display = "none";
    }

}

</script>

</body>
</html>

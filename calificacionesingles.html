
<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calificación</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:#e2e8f0;
    margin:0;
}

.container{
    max-width:600px;
    margin:auto;
    padding:30px;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

h1{
    color:#38bdf8;
}

/* ESTRELLAS */

.stars{
    display:flex;
    justify-content:center;
    flex-direction:row-reverse;
    font-size:30px;
    margin:20px 0;
}

.stars input{
    display:none;
}

.stars label{
    cursor:pointer;
    color:#334155;
    transition:0.3s;
}

.stars label:hover,
.stars label:hover ~ label,
.stars input:checked ~ label{
    color:#facc15;
}

/* TEXTO */

textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#020617;
    color:#fff;
    margin-top:10px;
}

/* BOTÓN */

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}

.back-btn{
    display:block;
    margin-top:15px;
    padding:10px;
    background:#38bdf8;
    color:#000;
    border-radius:8px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Rate the service</h1>

<form action="https://formspree.io/f/mjglrgzv" method="POST" onsubmit="mostrarMensaje()">

<div class="stars">

<input type="radio" id="star5" name="rating" value="5" required>
<label for="star5">★</label>

<input type="radio" id="star4" name="rating" value="4">
<label for="star4">★</label>

<input type="radio" id="star3" name="rating" value="3">
<label for="star3">★</label>

<input type="radio" id="star2" name="rating" value="2">
<label for="star2">★</label>

<input type="radio" id="star1" name="rating" value="1">
<label for="star1">★</label>

</div>

<textarea name="comentario" placeholder="Write your opinion..."></textarea>

<button type="submit">Send</button>

</form>

<p id="mensaje" style="display:none; margin-top:15px; color:#22c55e;">
Thank you for your opinion 🙌
</p>

<a href="indexingles.html" class="back-btn">back to home</a>

</div>

</div>

<script>
function mostrarMensaje(){
  document.getElementById("mensaje").style.display = "block";
}
</script>

</body>
</html>
